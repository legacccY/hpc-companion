name: build

# 在 GitHub 的 Windows / macOS runner 上自动打包 —— 本地没 Mac 也能出 .app。
# - push / PR：跑单元测试
# - push tag v*：打包 Windows .exe + macOS .app，并发布到 Release
# - 也可在 Actions 页手动触发（workflow_dispatch）

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 发 Release 需要写 contents 权限（默认 GITHUB_TOKEN 只读 → 附件 403）
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -q

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: HPC-Companion-windows
          - os: macos-latest
            artifact: HPC-Companion-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller build.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p out
          cp "dist/HPC-Companion.exe" "out/${{ matrix.artifact }}.exe"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out
          # ditto 保留 .app bundle 结构 + 资源叉，比 zip 可靠
          ditto -c -k --keepParent "dist/HPC Companion.app" "out/${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
